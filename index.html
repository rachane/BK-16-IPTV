<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>IPTV by BK-16</title>

<style>
  :root{
    --bg1:#0b1220; --bg2:#08101d;
    --panel:#0f172a; --border:#334155; --muted:#9fb2c7;
    --brand1:#17c1d6; --brand2:#31d17b;
    --bad:#fca5a5; --warn:#facc15;
  }

  *{box-sizing:border-box}

  body{
    margin:0;
    font-family:Inter,system-ui,Arial,sans-serif;
    background:linear-gradient(180deg,var(--bg1),var(--bg2));
    color:#fff;
  }

  header{
    position:sticky;
    top:0;
    z-index:10;
    background:rgba(0,0,0,.35);
    backdrop-filter:blur(6px);
    border-bottom:1px solid rgba(255,255,255,.06);
  }

  .bar{
    max-width:1200px;
    margin:0 auto;
    padding:14px 16px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:16px;
  }

  .brand{
    display:flex;
    align-items:center;
    gap:14px;
  }

  .brand img{
    width:64px;
    height:64px;
    object-fit:contain;
    border-radius:10px;
    display:block;
  }

  .title{
    font-weight:900;
    letter-spacing:.3px;
    font-size:clamp(22px,4vw,34px);
    background:linear-gradient(90deg,var(--brand1),var(--brand2));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }

  main{
    max-width:1200px;
    margin:16px auto;
    padding:0 12px;
  }

  .player{
    width:100%;
    aspect-ratio:16/9;
    background:#000;
    border-radius:16px;
    overflow:hidden;
    border:1px solid rgba(255,255,255,.12);
  }

  video{
    width:100%;
    height:100%;
    background:#000;
    outline:none;
  }

  .grid{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-top:12px;
    justify-content:center;
  }

  .ch{
    position:relative;
    width:150px;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:12px;
    cursor:pointer;
    text-align:center;
    padding:8px;
    transition:transform .15s ease, background .15s ease;
  }

  .ch:hover{
    transform:translateY(-1px);
    background:#0b1220;
  }

  .ch.active{
    outline:2px solid var(--brand1);
    box-shadow:0 0 0 3px rgba(23,193,214,.25) inset;
  }

  .ch.external{
    border-color:rgba(250,204,21,.55);
  }

  .ch img{
    width:100%;
    height:84px;
    object-fit:contain;
    display:block;
    margin:0 auto 6px;
  }

  .name{
    font-size:13px;
    color:#dbeafe;
    min-height:34px;
  }

  .badge{
    position:absolute;
    top:6px;
    right:6px;
    padding:2px 6px;
    border-radius:999px;
    font-size:10px;
    font-weight:800;
    color:#111827;
    background:var(--warn);
  }

  .hint{
    margin:10px 0 0;
    text-align:center;
    font-size:13px;
    color:var(--muted);
  }

  #status{
    min-height:22px;
    margin-top:8px;
    text-align:center;
    font-size:13px;
    color:var(--muted);
  }

  #status.bad{
    color:var(--bad);
  }

  #status a{
    color:#67e8f9;
    text-decoration:underline;
  }
</style>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>

<body>
<header>
  <div class="bar">
    <div class="brand">
      <img alt="BK-16" src="https://dl.dropbox.com/scl/fi/nx2b6zyo5cp4hwgtit12b/22-11-66-01-33-23.png?rlkey=khnfawin5mmaxg1vxq5l7nro3&dl=0">
      <div class="title">IPTV by BK-16</div>
    </div>
  </div>
</header>

<main>
  <div class="player">
    <video id="v" controls playsinline muted></video>
  </div>

  <div id="status"></div>

  <div id="grid-sports" class="grid"></div>

  <p class="hint">
    * คลิกโลโก้ช่องเพื่อเล่นทันที • ช่องที่ขึ้น External จะเปิดในแท็บใหม่สำหรับ HLS Player / VLC / Wiseplay
  </p>
</main>

<script>
/* ====== รายการช่องกีฬา ====== */
const sports = [
  /* Monomax World Cup */
  {
    id:"wc-monomax1",
    name:"FIFA World Cup MonoMax1",
    logo:"https://img2.pic.in.th/WorldCup.png",
    url:"https://yyi7tewa2x.3ppnkog.com/xstream/monomax-2/playlist.m3u8"
  },
  {
    id:"wc-monomax2",

  },
  {

  },
  {
    id:"fifa-plus",

    url:"https://a62dad94.wurl.com/master/f36d25e7e52f1ba8d7e56eb859c636563214f541/UmFrdXRlblRWLWV1X0ZJRkFQbHVzRW5nbGlzaF9ITFM/playlist.m3u8"
  },

  /* Monomax: เปิดแบบ External เพราะติด Mixed Content ในเว็บ HTTPS */
  {
    id:"monomax01",
    name:"Monomax Sport 01",
    logo:"https://img1.pic.in.th/images/011c7ba4fae8fe556a4.png",
    url:"https://blive99.github.io/m3u8/sporttv/monomax1.m3u8",

  },
  {
    id:"monomax02",
    name:"Monomax Sport 02",
    logo:"https://img2.pic.in.th/maxc2d18f180c225ce1.png",
    url:"https://blive99.github.io/m3u8/sporttv/monomax2.m3u8",
    externalOnly:true
  },
  {
    id:"monomax03",
    name:"Monomax Sport 03",
    logo:"https://img2.pic.in.th/maxc2d18f180c225ce1.png",
    url:"https://blive99.github.io/m3u8/sporttv/monomax3.m3u8",

  },

  /* อื่น ๆ */
  {
    id:"redbulltv",
    name:"Red Bull TV",
    logo:"https://img2.sport-tv-guide.live/images/tv-station-red-bull-tv-2760.png",

  {

  {

    name:"beIN SPORT TH 1",

  {

  {

  },

  {

  {

  {

    name:"True Sport 3",

  {
    id:"lfctv",
    name:"LFC TV",
    logo:"https://img2.sport-tv-guide.live/images/tv-station-lfc-tv-112.png",

    externalOnly:true
  }
];


/* ====== Player logic ====== */
const v = document.getElementById('v');
const gridSports = document.getElementById('grid-sports');
const statusBox = document.getElementById('status');

let _hls = null;
let currentId = null;

const isHls = (u) => /\.m3u8($|\?)/i.test(u);

function escapeHtml(text){
  return String(text)
    .replaceAll('&','&amp;')
    .replaceAll('<','&lt;')
    .replaceAll('>','&gt;')
    .replaceAll('"','&quot;')
    .replaceAll("'","&#039;");
}

function setStatus(msg, bad=false){
  statusBox.textContent = msg;
  statusBox.classList.toggle('bad', bad);
}

function setStatusHtml(html, bad=false){
  statusBox.innerHTML = html;
  statusBox.classList.toggle('bad', bad);
}

function stopCurrentStream(){
  if (_hls) {
    _hls.destroy();
    _hls = null;
  }

  v.pause();
  v.removeAttribute('src');
  v.load();
}

function setActive(id){
  document.querySelectorAll('.ch').forEach(el => {
    el.classList.toggle('active', el.dataset.id === id);
  });
  currentId = id;
}

function openExternalChannel(channel){
  stopCurrentStream();

  const newWindow = window.open(channel.url, '_blank', 'noopener,noreferrer');

  const safeName = escapeHtml(channel.name);
  const safeUrl = escapeHtml(channel.url);

  if (newWindow) {
    setStatusHtml(
      `เปิด <b>${safeName}</b> ในแท็บใหม่แล้ว หากไม่เล่นอัตโนมัติ ให้ใช้ HLS Player Extension / VLC / Wiseplay`,
      false
    );
  } else {
    setStatusHtml(
      `เบราว์เซอร์บล็อก popup ของ <b>${safeName}</b> — <a href="${safeUrl}" target="_blank" rel="noopener noreferrer">คลิกเปิดช่องนี้อีกครั้ง</a>`,
      true
    );
  }
}

function playUrl(url){
  setStatus('กำลังโหลดสัญญาณ...');

  if (url.startsWith('http://')) {
    stopCurrentStream();
    setStatus('ช่องนี้เป็น HTTP จึงเล่นบนเว็บ HTTPS ไม่ได้ กำลังเปิดในแท็บใหม่แทน', true);
    window.open(url, '_blank', 'noopener,noreferrer');
    return;
  }

  if (!isHls(url)) {
    stopCurrentStream();
    window.open(url, '_blank', 'noopener,noreferrer');
    setStatus('เปิดหน้าเว็บภายนอกแล้ว');
    return;
  }

  if (_hls) {
    _hls.destroy();
    _hls = null;
  }

  v.removeAttribute('src');
  v.load();

  if (v.canPlayType('application/vnd.apple.mpegurl')) {
    v.src = url;
    v.play()
      .then(() => setStatus('กำลังเล่น'))
      .catch(err => setStatus('เล่นไม่ได้: ' + err.message, true));
    return;
  }

  if (window.Hls && Hls.isSupported()) {
    _hls = new Hls({
      debug:false,
      enableWorker:true,
      lowLatencyMode:true,
      maxBufferLength:30
    });

    _hls.loadSource(url);
    _hls.attachMedia(v);

    _hls.on(Hls.Events.MANIFEST_PARSED, () => {
      setStatus('โหลดสัญญาณสำเร็จ กำลังเล่น...');
      v.play()
        .then(() => setStatus('กำลังเล่น'))
        .catch(err => setStatus('Autoplay error: ' + err.message, true));
    });

    _hls.on(Hls.Events.ERROR, (event, data) => {
      console.warn('HLS ERROR:', data);

      const msg = `HLS Error: ${data.type} / ${data.details}${data.fatal ? ' / fatal' : ''}`;
      setStatus(msg, data.fatal);

      if (data.fatal) {
        if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
          _hls.recoverMediaError();
        } else {
          _hls.destroy();
          _hls = null;
        }
      }
    });

    return;
  }

  setStatus('เบราว์เซอร์นี้ไม่รองรับ HLS', true);
  alert('เบราว์เซอร์นี้ไม่รองรับ HLS');
}

function renderGrid(){
  gridSports.innerHTML = '';

  sports.forEach(c => {
    const d = document.createElement('div');

    d.className = c.externalOnly ? 'ch external' : 'ch';
    d.dataset.id = c.id;

    const badge = c.externalOnly ? '<div class="badge">EXT</div>' : '';

    d.innerHTML = `
      ${badge}
      <img src="${c.logo}" alt="${escapeHtml(c.name)}">
      <div class="name">${escapeHtml(c.name)}</div>
    `;

    d.onclick = () => {
      setActive(c.id);

      if (c.externalOnly) {
        openExternalChannel(c);
        return;
      }

      playUrl(c.url);
    };

    gridSports.appendChild(d);
  });
}

renderGrid();

/* เล่นช่องแรกที่ไม่ใช่ External อัตโนมัติ */
const firstPlayable = sports.find(c => !c.externalOnly);

if (firstPlayable) {
  setActive(firstPlayable.id);
  playUrl(firstPlayable.url);
}
</script>

</html>
