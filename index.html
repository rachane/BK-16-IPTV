<head>

<title>IPTV by BK-16</title>

<style>
  :root{
    --bg1:#0b1220;
    --bg2:#08101d;
    --panel:#0f172a;
    --panel2:#111c33;
    --border:#334155;
    --muted:#9fb2c7;
    --brand1:#17c1d6;
    --brand2:#31d17b;
    --bad:#fca5a5;
    --warn:#facc15;
    --ok:#86efac;
  }

  *{box-sizing:border-box}

  body{
    margin:0;
    font-family:Inter,system-ui,Arial,sans-serif;
    background:linear-gradient(180deg,var(--bg1),var(--bg2));
    color:#fff;
  }

  header{
    position:sticky;
    top:0;
    z-index:10;
    background:rgba(0,0,0,.35);
    backdrop-filter:blur(6px);
    border-bottom:1px solid rgba(255,255,255,.06);
  }

  .bar{
    max-width:1200px;
    margin:0 auto;
    padding:14px 16px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:16px;
  }

  .brand{
    display:flex;
    align-items:center;
    gap:14px;
  }

  .brand img{
    width:64px;
    height:64px;
    object-fit:contain;
    border-radius:10px;
    display:block;
  }

  .title{
    font-weight:900;
    letter-spacing:.3px;
    font-size:clamp(22px,4vw,34px);
    background:linear-gradient(90deg,var(--brand1),var(--brand2));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }

  main{
    max-width:1200px;
    margin:16px auto;
    padding:0 12px 24px;
  }

  .player{
    width:100%;
    aspect-ratio:16/9;
    background:#000;
    border-radius:16px;
    overflow:hidden;
    border:1px solid rgba(255,255,255,.12);
  }

  video{
    width:100%;
    height:100%;
    background:#000;
    outline:none;
  }

  #status{
    min-height:24px;
    margin-top:8px;
    text-align:center;
    font-size:13px;
    color:var(--muted);
  }

  #status.bad{color:var(--bad)}
  #status.ok{color:var(--ok)}

  #status a{
    color:#67e8f9;
    text-decoration:underline;
  }

  .grid{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-top:12px;
    justify-content:center;
  }

  .ch{
    position:relative;
    width:150px;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:12px;
    cursor:pointer;
    text-align:center;
    padding:8px;
    transition:transform .15s ease, background .15s ease, border-color .15s ease;
  }

  .ch:hover{
    transform:translateY(-1px);
    background:#0b1220;
  }

  .ch.active{
    outline:2px solid var(--brand1);
    box-shadow:0 0 0 3px rgba(23,193,214,.25) inset;
  }

  .ch.external{
    border-color:rgba(250,204,21,.65);
  }

  .ch img{
    width:100%;
    height:84px;
    object-fit:contain;
    display:block;
    margin:0 auto 6px;
  }

  .name{
    font-size:13px;
    color:#dbeafe;
    min-height:34px;
  }

  .badge{
    position:absolute;
    top:6px;
    right:6px;
    padding:2px 6px;
    border-radius:999px;
    font-size:10px;
    font-weight:900;
    color:#111827;
    background:var(--warn);
  }

  .hint{
    margin:10px 0 0;
    text-align:center;
    font-size:13px;
    color:var(--muted);
    line-height:1.5;
  }

  /* ===== EXT Modal ===== */
  .modal-backdrop{
    position:fixed;
    inset:0;
    z-index:999;
    display:none;
    align-items:center;
    justify-content:center;
    padding:16px;
    background:rgba(0,0,0,.62);
    backdrop-filter:blur(5px);
  }

  .modal-backdrop.show{
    display:flex;
  }

  .modal{
    width:min(560px,100%);
    background:linear-gradient(180deg,#111c33,#0b1220);
    border:1px solid rgba(255,255,255,.16);
    border-radius:18px;
    box-shadow:0 20px 80px rgba(0,0,0,.45);
    overflow:hidden;
  }

  .modal-head{
    display:flex;
    gap:12px;
    align-items:center;
    padding:14px 16px;
    border-bottom:1px solid rgba(255,255,255,.08);
  }

  .modal-head img{
    width:58px;
    height:58px;
    object-fit:contain;
    border-radius:10px;
    background:#fff;
    padding:4px;
  }

  .modal-title{
    flex:1;
  }

  .modal-title strong{
    display:block;
    font-size:17px;
  }

  .modal-title span{
    display:block;
    margin-top:3px;
    font-size:12px;
    color:var(--muted);
  }

  .close-btn{
    width:34px;
    height:34px;
    border-radius:999px;
    border:1px solid rgba(255,255,255,.16);
    background:#0f172a;
    color:#fff;
    cursor:pointer;
    font-size:18px;
  }

  .modal-body{
    padding:14px 16px 16px;
  }

  .modal-note{
    margin:0 0 12px;
    padding:10px 12px;
    border-radius:12px;
    background:rgba(250,204,21,.10);
    border:1px solid rgba(250,204,21,.25);
    color:#fde68a;
    font-size:13px;
    line-height:1.5;
  }

  .url-box{
    margin:10px 0 12px;
    padding:9px 10px;
    border-radius:10px;
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.10);
    color:#cbd5e1;
    font-size:12px;
    word-break:break-all;
  }

  .btn-grid{
    display:grid;
    grid-template-columns:1fr;
    gap:9px;
  }

  .action-btn{
    width:100%;
    border:1px solid rgba(255,255,255,.12);
    background:#111c33;
    color:#fff;
    padding:11px 12px;
    border-radius:12px;
    cursor:pointer;
    text-align:left;
    font-weight:800;
    transition:transform .12s ease, background .12s ease;
  }

  .action-btn:hover{
    transform:translateY(-1px);
    background:#152541;
  }

  .action-btn small{
    display:block;
    margin-top:3px;
    color:var(--muted);
    font-weight:500;
    line-height:1.35;
  }

  .action-btn.primary{
    border-color:rgba(23,193,214,.45);
    background:linear-gradient(90deg,rgba(23,193,214,.22),rgba(49,209,123,.18));
  }

  .action-btn.warn{
    border-color:rgba(250,204,21,.35);
  }

  .action-btn.danger{
    border-color:rgba(252,165,165,.35);
  }

  @media (min-width:520px){
    .btn-grid.two{
      grid-template-columns:1fr 1fr;
    }
  }
</style>

/* ==============================
   Utilities
================================= */
const isHls = (u) => /\.m3u8($|\?)/i.test(u);

function isAndroid(){
  return /Android/i.test(navigator.userAgent);
}

function isIOS(){
  return /iPhone|iPad|iPod/i.test(navigator.userAgent);
}

function escapeHtml(text){
  return String(text)
    .replaceAll('&','&amp;')
    .replaceAll('<','&lt;')
    .replaceAll('>','&gt;')
    .replaceAll('"','&quot;')
    .replaceAll("'","&#039;");
}

function setStatus(msg, type='normal'){
  statusBox.textContent = msg;
  statusBox.classList.toggle('bad', type === 'bad');
  statusBox.classList.toggle('ok', type === 'ok');
}

function setStatusHtml(html, type='normal'){
  statusBox.innerHTML = html;
  statusBox.classList.toggle('bad', type === 'bad');
  statusBox.classList.toggle('ok', type === 'ok');
}

function stopCurrentStream(){
  if (_hls) {
    _hls.destroy();
    _hls = null;
  }

  v.pause();
  v.removeAttribute('src');
  v.load();
}

function setActive(id){
  document.querySelectorAll('.ch').forEach(el => {
    el.classList.toggle('active', el.dataset.id === id);
  });
  currentId = id;
}

async function copyToClipboard(text){
  if (navigator.clipboard && window.isSecureContext) {
    await navigator.clipboard.writeText(text);
    return;
  }

  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  ta.style.top = '-9999px';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();

  try {
    document.execCommand('copy');
  } finally {
    document.body.removeChild(ta);
  }
}

function safeParseUrl(url){
  try {
    return new URL(url);
  } catch (err) {
    return null;
  }
}


/* ==============================
   Android Intent Builder
   - Generic chooser: no package
   - VLC direct: package=org.videolan.vlc
================================= */
function buildAndroidIntent(url, packageName=''){
  const parsed = safeParseUrl(url);

  if (!parsed) return url;

  const scheme = parsed.protocol.replace(':','');
  const hostPath = parsed.host + parsed.pathname + parsed.search + parsed.hash;

  let intent = `intent://${hostPath}#Intent;`;
  intent += `scheme=${scheme};`;
  intent += `action=android.intent.action.VIEW;`;
  intent += `type=application/vnd.apple.mpegurl;`;

  if (packageName) {
    intent += `package=${packageName};`;
    intent += `S.browser_fallback_url=${encodeURIComponent('https://play.google.com/store/apps/details?id=' + packageName)};`;
  } else {
    intent += `S.browser_fallback_url=${encodeURIComponent(url)};`;
  }

  intent += `end`;

  return intent;
}

function openAndroidChooser(url){
  const intentUrl = buildAndroidIntent(url);
  window.location.href = intentUrl;
}

function openVlcAndroid(url){
  const intentUrl = buildAndroidIntent(url, 'org.videolan.vlc');
  window.location.href = intentUrl;
}


/* ==============================
   iOS helper
   ทดลองเปิด VLC iOS แบบ best-effort
   หมายเหตุ: iOS/player app แต่ละตัวอาจรองรับ scheme ไม่เหมือนกัน
================================= */
function tryOpenVlcIOS(url){
  const vlcUrl = `vlc-x-callback://x-callback-url/stream?url=${encodeURIComponent(url)}`;

  setStatus('กำลังทดลองเปิด VLC บน iOS ถ้าไม่เด้ง ให้ใช้ Share link หรือ Copy link แทน', 'normal');

  window.location.href = vlcUrl;

  setTimeout(() => {
    setStatus('ถ้า VLC ไม่เปิด ให้กด Share link หรือ Copy link แล้วนำไปเปิดในแอป player', 'bad');
  }, 1400);
}


/* ==============================
   Modal
================================= */
function openExtModal(channel){
  selectedExternalChannel = channel;
  stopCurrentStream();

  modalLogo.src = channel.logo || '';
  modalLogo.alt = channel.name || '';
  modalName.textContent = channel.name || 'External Channel';
  modalUrl.textContent = channel.url || '';

  extModal.classList.add('show');

  const safeName = escapeHtml(channel.name);
  setStatusHtml(`เลือกวิธีเปิด <b>${safeName}</b> จากหน้าต่าง EXT`, 'normal');
}

function closeExtModal(){
  extModal.classList.remove('show');
}

closeModal.onclick = closeExtModal;

extModal.addEventListener('click', (e) => {
  if (e.target === extModal) closeExtModal();
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeExtModal();
});


/* ==============================
   EXT Buttons
================================= */
btnAndroidChooser.onclick = () => {
  if (!selectedExternalChannel) return;

  if (!isAndroid()) {
    setStatus('ปุ่มนี้เหมาะกับ Android เท่านั้น บน PC ให้ใช้เปิดแท็บใหม่ / บน iPhone ให้ใช้ Share หรือ Copy', 'bad');

  setStatus('กำลังเปิด Android App Chooser เพื่อเลือก VLC / Wiseplay / Liftplay...', 'normal');
  openAndroidChooser(selectedExternalChannel.url);
};

btnVlcAndroid.onclick = () => {
  if (!selectedExternalChannel) return;

  if (!isAndroid()) {
    setStatus('ปุ่ม VLC Android ใช้กับ Android เท่านั้น', 'bad');
    return;
  }

  setStatus('กำลังเปิด VLC Android...', 'normal');
  openVlcAndroid(selectedExternalChannel.url);
};

btnShare.onclick = async () => {
  if (!selectedExternalChannel) return;

  const shareData = {
    title: selectedExternalChannel.name,
    text: selectedExternalChannel.name,
    url: selectedExternalChannel.url
  };

  if (navigator.share) {
    try {
      await navigator.share(shareData);
      setStatus('เปิดเมนู Share แล้ว ให้เลือก VLC / Wiseplay / Liftplay หรือแอป player ที่มีในเครื่อง', 'ok');
    } catch (err) {
      setStatus('ยกเลิกการ Share หรือ Share ไม่สำเร็จ', 'bad');
    }
  } else {
    try {
      await copyToClipboard(selectedExternalChannel.url);
      setStatus('อุปกรณ์นี้ไม่มี Web Share — คัดลอกลิงก์ให้แล้ว', 'ok');
    } catch (err) {
      setStatus('คัดลอกลิงก์ไม่สำเร็จ', 'bad');
    }
  }
};

btnCopy.onclick = async () => {
  if (!selectedExternalChannel) return;

  try {
    await copyToClipboard(selectedExternalChannel.url);
    setStatus('คัดลอกลิงก์แล้ว ให้นำไปวางใน VLC / Wiseplay / Liftplay', 'ok');
  } catch (err) {
    setStatus('คัดลอกลิงก์ไม่สำเร็จ กรุณากดค้างที่ลิงก์แล้ว copy เอง', 'bad');
  }
};

btnOpenTab.onclick = () => {
  if (!selectedExternalChannel) return;

  const win = window.open(selectedExternalChannel.url, '_blank', 'noopener,noreferrer');

  if (win) {
    setStatus('เปิดแท็บใหม่แล้ว ถ้าเป็น Chrome PC ให้ HLS Player Extension รับช่วงต่อ', 'ok');
  } else {
    setStatus('เบราว์เซอร์บล็อก popup กรุณาอนุญาต popup หรือใช้ Copy link', 'bad');
  }
};

btnTryWeb.onclick = () => {
  if (!selectedExternalChannel) return;

  closeExtModal();
  setStatus('กำลังลองเล่นในเว็บ ถ้ายังติด Mixed Content จะเล่นไม่ได้', 'normal');
  playUrl(selectedExternalChannel.url, true);
};


/* ==============================
   Player
================================= */
function playUrl(url, forceTry=false){
  setStatus('กำลังโหลดสัญญาณ...', 'normal');

  if (!forceTry && url.startsWith('http://')) {
    setStatus('ช่องนี้เป็น HTTP จึงเล่นบนเว็บ HTTPS ไม่ได้ ให้เปิดด้วย EXT player', 'bad');
    return;
  }

  if (!isHls(url)) {
    stopCurrentStream();
    const win = window.open(url, '_blank', 'noopener,noreferrer');

    if (win) {
      setStatus('เปิดหน้าเว็บภายนอกแล้ว', 'ok');
    } else {
      setStatus('เบราว์เซอร์บล็อก popup', 'bad');
    }

    return;
  }

  if (_hls) {
    _hls.destroy();
    _hls = null;
  }

  v.removeAttribute('src');
  v.load();

  if (v.canPlayType('application/vnd.apple.mpegurl')) {
    v.src = url;
    v.play()
      .then(() => setStatus('กำลังเล่น', 'ok'))
      .catch(err => setStatus('เล่นไม่ได้: ' + err.message, 'bad'));
    return;
  }

  if (window.Hls && Hls.isSupported()) {
    _hls = new Hls({
      debug:false,
      enableWorker:true,
      lowLatencyMode:true,
      maxBufferLength:30
    });

    _hls.loadSource(url);
    _hls.attachMedia(v);

    _hls.on(Hls.Events.MANIFEST_PARSED, () => {
      setStatus('โหลดสัญญาณสำเร็จ กำลังเล่น...', 'normal');
      v.play()
        .then(() => setStatus('กำลังเล่น', 'ok'))
        .catch(err => setStatus('Autoplay error: ' + err.message, 'bad'));
    });

    _hls.on(Hls.Events.ERROR, (event, data) => {
      console.warn('HLS ERROR:', data);

      let msg = `HLS Error: ${data.type} / ${data.details}`;

      if (data.details && String(data.details).includes('manifestLoadError')) {
        msg += ' — อาจติด CORS / Mixed Content / server block';
      }

      setStatus(msg, data.fatal ? 'bad' : 'normal');

      if (data.fatal) {
        if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
          _hls.recoverMediaError();
        } else {
          _hls.destroy();
          _hls = null;
        }
      }
    });

    return;
  }

  setStatus('เบราว์เซอร์นี้ไม่รองรับ HLS', 'bad');
}


/* ==============================
   Render channels
================================= */
function renderGrid(){
  gridSports.innerHTML = '';

  sports.forEach(c => {
    const d = document.createElement('div');

    d.className = c.externalOnly ? 'ch external' : 'ch';
    d.dataset.id = c.id;

    const badge = c.externalOnly ? '<div class="badge">EXT</div>' : '';

    d.innerHTML = `
      ${badge}
      <img src="${escapeHtml(c.logo)}" alt="${escapeHtml(c.name)}">
      <div class="name">${escapeHtml(c.name)}</div>
    `;

    d.onclick = () => {
      setActive(c.id);

      if (c.externalOnly) {
        openExtModal(c);
        return;
      }

      playUrl(c.url);
    };

    gridSports.appendChild(d);
  });
}

renderGrid();

/* Auto play first normal channel */
const firstPlayable = sports.find(c => !c.externalOnly);

if (firstPlayable) {
  setActive(firstPlayable.id);
  playUrl(firstPlayable.url);
}
</script>
